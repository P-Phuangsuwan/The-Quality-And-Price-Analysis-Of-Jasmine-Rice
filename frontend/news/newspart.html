<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดข่าว - Smart Rice AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Modern, soft green background specifically for news details */
        body {
            background: linear-gradient(135deg, #e8f2ea 0%, #d1e2d4 100%);
            /* Soft, pleasant green */
        }

        .news-detail-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        .news-detail-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(31, 38, 135, 0.1);
            margin-top: 20px;
        }

        .news-detail-header-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }

        .news-detail-content {
            padding: 40px;
        }

        .news-detail-title {
            font-size: 2rem;
            font-weight: 600;
            color: #1A3626;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .news-detail-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #5C7262;
            font-size: 0.95rem;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .news-detail-meta span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .news-detail-body {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #2D3A31;
        }

        .news-detail-body p {
            margin-bottom: 20px;
        }

        .news-detail-body p:first-child::first-letter {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2ecc71;
            /* Green accent */
            float: left;
            margin-right: 8px;
            line-height: 1;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #1A3626;
            font-weight: 500;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            color: #2ecc71;
        }
    </style>
</head>

<body>
    <!-- Top Header (Black in sketch) -->
    <header class="top-header">
        <div class="header-logo">
            <i class="fa-solid fa-leaf"></i> <span>Smart Rice AI</span>
        </div>
        <!-- Additional Menu (Yellow in sketch) -->
        <button class="menu-btn" title="เมนูเพิ่มเติม">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <!-- Sidebar Overlay & Menu (Yellow in sketch) -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar" id="sidebar">
        <!-- same sidebar content as index.html -->
        <div class="sidebar-header">
            <h3><i class="fa-solid fa-bars"></i> เมนูเพิ่มเติม</h3>
            <button id="closeSidebar"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="../user/user_account.html" class="nav-item"><i class="fa-solid fa-user"></i> บัญชี</a>
            <a href="../index/index.html" class="nav-item"><i class="fa-solid fa-home"></i> หน้าแรก</a>
            <a href="newspage.html" class="nav-item"><i class="fa-solid fa-newspaper"></i> ข่าวสาร</a>
            <a href="../index/weather.html" class="nav-item"><i class="fa-solid fa-cloud-sun"></i> สภาพอากาศ</a>
            <a href="../index/rice_price.html" class="nav-item"><i class="fa-solid fa-tags"></i> ราคาข้าวหอมมะลิ</a>
            <a href="../user/user_setting.html" class="nav-item"><i class="fa-solid fa-gear"></i> ตั้งค่า</a>
            <a href="../frontindex.html" class="nav-item"><i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ</a>
        </nav>
    </aside>

    <main class="dashboard-container">
        <div class="news-detail-wrapper">
            <a href="../index/index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> กลับไปหน้าแรก</a>

            <div class="news-detail-card" id="newsContent">
                <!-- Content will be injected by JavaScript -->
                <div style="padding: 40px; text-align: center;">
                    <i class="fa-solid fa-spinner fa-spin fa-3x"
                        style="color: var(--accent-green); margin-bottom: 20px;"></i>
                    <p>กำลังโหลดข้อมูลข่าว...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Chatbot FAB (Blue in sketch) -->
    <div class="chatbot-fab" id="chatbotBtn">
        <i class="fa-solid fa-comment-dots"></i>
    </div>

    <!-- Chatbot Window -->
    <div class="chatbot-window glass-card" id="chatbotWindow">
        <div class="chat-header">
            <h3><i class="fa-solid fa-robot"></i> ผู้ช่วยฟาร์มอัจฉริยะ (AI)</h3>
            <button id="closeChat"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message ai-message">
                สวัสดีครับ! 🌾 เปิดอ่านข่าวแล้วมีข้อสงสัยตรงไหน ถามผมได้เลยนะครับ ผมพร้อมวิเคราะห์และให้คำแนะนำเพิ่มเติม
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="พิมพ์คำถามของคุณที่นี่...">
            <button id="sendMessage"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        // Mock News Database
        const newsDatabase = {
            1: {

                date: "25 ก.พ. 2026",
                author: "กรมอุตุนิยมวิทยา",
                image: "https://images.unsplash.com/photo-1590682680695-43b964a3ae17?auto=format&fit=crop&q=80&w=1200&h=600",
                content: `
                    <p>กรมอุตุนิยมวิทยาออกประกาศเตือนเกษตรกรในพื้นที่ภาคตะวันออกเฉียงเหนือให้เตรียมรับมือกับภาวะฝนทิ้งช่วงที่จะเกิดขึ้นในเดือนหน้า ซึ่งอาจส่งผลกระทบโดยตรงต่อผลผลิตทางการเกษตร โดยเฉพาะข้าวที่อยู่ในระยะตั้งท้อง</p>

                    <p>นอกจากนี้ ยังสนับสนุนให้เกษตรกรนำเทคโนโลยี IoT เข้ามาช่วยในการตรวจวัดความชื้นในดิน เพื่อให้การให้น้ำเป็นไปอย่างแม่นยำและเกิดประสิทธิภาพสูงสุด ซึ่งจะช่วยลดความเสี่ยงจากภาวะภัยแล้งได้เป็นอย่างดี ติดตามข่าวสารสภาพอากาศอย่างใกล้ชิดผ่านแอปพลิเคชัน Smart Rice AI ของเราเพื่อรับการแจ้งเตือนแบบเรียลไทม์</p>

                    <p>โครงการนี้ตั้งเป้าหมายที่จะเพิ่มผลผลิตข้าวเฉลี่ยต่อไร่ให้สูงขึ้นถึง 15% ภายในระยะเวลา 2 ปี พร้อมทั้งช่วยลดต้นทุนการผลิต ไม่ว่าจะเป็นการใช้ปุ๋ยเคมีหรือยาฆ่าแมลง ซึ่ง AI จะทำหน้าที่วิเคราะห์ข้อมูลจากภาพถ่ายดาวเทียมและเซนเซอร์ในแปลงนา เพื่อบอกปริมาณที่เหมาะสมและจุดที่ควรใส่ปุ๋ย</p>
                    <p>เกษตรกรที่สนใจสามารถเข้าร่วมอบรมและขอรับเงินอุดหนุนในการจัดซื้ออุปกรณ์ได้ที่สำนักงานเกษตรอำเภอทุกแห่งทั่วประเทศ นโยบายนี้ไม่เพียงแต่ช่วยเพิ่มรายได้ให้เกษตรกร แต่ยังส่งเสริมความยั่งยืนด้านสิ่งแวดล้อมอีกด้วย</p>

                    <p>ผู้เชี่ยวชาญด้านเศรษฐศาสตร์การเกษตรชี้ว่า นี่คือโอกาสทองของเกษตรกรไทยที่จะเน้นผลิต "ข้าวคุณภาพสูง" อาทิ ข้าวหอมมะลิออร์แกนิก หรือข้าวสายพันธุ์พิเศษที่ตอบโจทย์เทรนด์สุขภาพโลก เพื่อดึงดูดกำลังซื้อที่มีแนวโน้มปรับตัวสูงขึ้น</p>

                content: `
